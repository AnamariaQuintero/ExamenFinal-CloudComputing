AWSTemplateFormatVersion: '2010-09-09'
Description: Stack 4 - Scheduled Actions and Launch Template Version 2

Parameters:
  StudentName:
    Type: String
    Default: Fernando-Benavides

  SecurityStackName:
    Type: String
    Default: SecurityGroups-Fernando-Benavides

  AlbAsgStackName:
    Type: String
    Default: ALB-ASG-Fernando-Benavides

  LatestAmazonLinuxAmi:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  LaunchTemplateVersion2:
    Type: AWS::EC2::LaunchTemplateVersion
    Properties:
      LaunchTemplateId:
        Fn::ImportValue: !Sub ${AlbAsgStackName}-LaunchTemplateId
      SourceVersion: '1'
      VersionDescription: Version 2 - Updated web page
      LaunchTemplateData:
        ImageId: !Ref LatestAmazonLinuxAmi
        InstanceType: t3.micro
        SecurityGroupIds:
          - Fn::ImportValue: !Sub ${SecurityStackName}-EC2SecurityGroupId
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            dnf update -y
            dnf install -y httpd
            systemctl enable httpd
            systemctl start httpd

            INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)

            cat <<EOF > /var/www/html/index.html
            <!DOCTYPE html>
            <html>
            <head>
              <title>Launch Template V2 - ${StudentName}</title>
            </head>
            <body>
              <h1>Aplicacion actualizada con Launch Template Version 2</h1>
              <h2>Estudiante: ${StudentName}</h2>
              <p>Esta instancia fue creada usando la segunda version del Launch Template.</p>
              <p>Instance ID: $INSTANCE_ID</p>
              <p>Version del Launch Template: 2</p>
            </body>
            </html>
            EOF

  UpdateAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub ${AlbAsgStackName}-AutoScalingGroupName
      MinSize: '1'
      MaxSize: '4'
      DesiredCapacity: '2'
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub ${SecurityStackName}-PublicSubnet1
        - Fn::ImportValue: !Sub ${SecurityStackName}-PublicSubnet2
      LaunchTemplate:
        LaunchTemplateId:
          Fn::ImportValue: !Sub ${AlbAsgStackName}-LaunchTemplateId
        Version: !GetAtt LaunchTemplateVersion2.VersionNumber

  ScheduledScaleUpMorning:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub ${AlbAsgStackName}-AutoScalingGroupName
      ScheduledActionName: !Sub ScaleUpMorning-${StudentName}
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 3
      Recurrence: "0 13 * * *"

  ScheduledScaleUpAfternoon:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub ${AlbAsgStackName}-AutoScalingGroupName
      ScheduledActionName: !Sub ScaleUpAfternoon-${StudentName}
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 4
      Recurrence: "0 18 * * *"

  ScheduledScaleDownNight:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub ${AlbAsgStackName}-AutoScalingGroupName
      ScheduledActionName: !Sub ScaleDownNight-${StudentName}
      MinSize: 1
      MaxSize: 4
      DesiredCapacity: 2
      Recurrence: "0 23 * * *"

  ScheduledScaleDownLateNight:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName:
        Fn::ImportValue: !Sub ${AlbAsgStackName}-AutoScalingGroupName
      ScheduledActionName: !Sub ScaleDownLateNight-${StudentName}
      MinSize: 1
      MaxSize: 4
      DesiredCapacity: 1
      Recurrence: "0 4 * * *"

Outputs:

  LaunchTemplateVersion2:
    Description: Created Launch Template Version 2
    Value: !GetAtt LaunchTemplateVersion2.VersionNumber

  AutoScalingGroupUpdated:
    Description: Auto Scaling Group updated to Launch Template Version 2
    Value:
      Fn::ImportValue: !Sub ${AlbAsgStackName}-AutoScalingGroupName

  ScheduledActions:
    Description: Scheduled actions created
    Value: Four scheduled actions created successfully
